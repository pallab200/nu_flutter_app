# ── JVM heap ──────────────────────────────────────────────────────────────
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC

# ── AndroidX ──────────────────────────────────────────────────────────────
android.useAndroidX=true

# ── Build performance ─────────────────────────────────────────────────────
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
android.enableJetifier=false
kotlin.incremental=true
kotlin.daemon.jvm.options=-Xmx4G

# ── R8 full-mode (smaller, faster release binaries) ───────────────────────
android.enableR8.fullMode=true

# ── Non-transitive R class (faster builds, less memory) ───────────────────
android.nonTransitiveRClass=true
android.nonFinalResIds=false

# ── JDK location ──────────────────────────────────────────────────────────
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr
